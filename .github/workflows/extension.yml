name: VS Code Extension Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  package-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm -C packages/core build

      - name: Build CLI bundle
        run: pnpm -C packages/cli build

      - name: Build server
        run: pnpm -C packages/server build

      - name: Bundle server into client
        run: pnpm -C packages/client-vscode bundle:server

      - name: Build client bundle
        run: pnpm -C packages/client-vscode bundle

      - name: Package VSIX
        run: pnpm -C packages/client-vscode package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-lsl-lsp-vsix
          path: packages/client-vscode/*.vsix

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsl-lsp-cli
          path: |
            packages/cli/out/lsl-lsp.cjs
            packages/cli/out/lsl-lsp.cjs.map

      - name: Add run summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## ✅ VSIX artifact ready";
            echo;
            echo "- Open the run: ${RUN_URL}";
            echo "- Download from the Artifacts section: vscode-lsl-lsp-vsix";
            echo "- CLI bundle artifact: lsl-lsp-cli";
            echo;
            echo "Tip (GitHub CLI):";
            echo "\`gh run download ${{ github.run_id }} -n vscode-lsl-lsp-vsix\`";
            echo "\`gh run download ${{ github.run_id }} -n lsl-lsp-cli\`";
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish Release (on tags)
    needs: package-extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-lsl-lsp-vsix
          path: release-assets

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: lsl-lsp-cli
          path: release-assets

      - name: Build release notes from changelog
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          awk -v version="${version}" '
            $0 == "## " version { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' packages/client-vscode/CHANGELOG.md | sed '${/^$/d;}' > "${notes_file}"

          if [[ ! -s "${notes_file}" ]]; then
            echo "No changelog section found for ${version}" >&2
            exit 1
          fi

          previous_tag="$(git tag --sort=-v:refname | awk -v tag="${tag}" '$0 == tag { seen = 1; next } seen && /^v[0-9]/ { print; exit }')"
          if [[ -n "${previous_tag}" ]]; then
            {
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag}"
            } >> "${notes_file}"
          fi

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            release-assets/*.vsix
            release-assets/lsl-lsp.cjs
            release-assets/lsl-lsp.cjs.map
          fail_on_unmatched_files: true
