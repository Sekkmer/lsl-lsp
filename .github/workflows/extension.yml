name: VS Code Extension Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  package-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm -C packages/core build

      - name: Build CLI bundle
        run: pnpm -C packages/cli build

      - name: Build server
        run: pnpm -C packages/server build

      - name: Bundle server into client
        run: pnpm -C packages/client-vscode bundle:server

      - name: Build client bundle
        run: pnpm -C packages/client-vscode bundle

      - name: Package VSIX
        run: pnpm -C packages/client-vscode package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-lsl-lsp-vsix
          path: packages/client-vscode/*.vsix

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsl-lsp-cli
          path: |
            packages/cli/out/lsl-lsp.cjs
            packages/cli/out/lsl-lsp.cjs.map

      - name: Add run summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## ✅ VSIX artifact ready";
            echo;
            echo "- Open the run: ${RUN_URL}";
            echo "- Download from the Artifacts section: vscode-lsl-lsp-vsix";
            echo "- CLI bundle artifact: lsl-lsp-cli";
            echo;
            echo "Tip (GitHub CLI):";
            echo "\`gh run download ${{ github.run_id }} -n vscode-lsl-lsp-vsix\`";
            echo "\`gh run download ${{ github.run_id }} -n lsl-lsp-cli\`";
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish Release (on tags)
    needs: package-extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-lsl-lsp-vsix
          path: release-assets

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: lsl-lsp-cli
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.vsix
            release-assets/lsl-lsp.cjs
            release-assets/lsl-lsp.cjs.map
          generate_release_notes: true
          fail_on_unmatched_files: true
